<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0d0f11"/>
  <!-- Candlestick body (tall) -->
  <line x1="9" y1="4" x2="9" y2="8" stroke="#eef0f2" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
  <rect x="6" y="8" width="6" height="13" rx="1.2" fill="#eef0f2" opacity="0.9"/>
  <line x1="9" y1="21" x2="9" y2="26" stroke="#eef0f2" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
  <!-- Candlestick outline (short) -->
  <line x1="18" y1="9" x2="18" y2="12" stroke="#eef0f2" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <rect x="15" y="12" width="6" height="7" rx="1.2" fill="none" stroke="#eef0f2" stroke-width="1.2" opacity="0.4"/>
  <line x1="18" y1="19" x2="18" y2="23" stroke="#eef0f2" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Pip dot -->
  <circle cx="26" cy="16" r="3" fill="#3ecf8e" opacity="0.9"/>
</svg>
